name: fetch-south
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: fetch
     run: |
      pip install beautifulsoup4 requests
      python script.py
      ls -l out | head
   - name: commit
     run: |
      git config user.email act@example.com; git config user.name act; git add out; git commit -m out || true; git push
