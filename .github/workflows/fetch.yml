name: fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p out
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s125223/Notice%20of%20Adjournment%20-%20Sheen%20Polish%20Delicatessen.pdf' > out/apol.pdf
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s125224/Notice%20of%20Adjournment%20-%20Enoteca%20Chiaia.pdf' > out/aeno.pdf
      ls -l out
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add out; git commit -m out || true; git push
