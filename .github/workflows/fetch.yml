name: lamb2fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p out
      curl --max-time 60 --connect-timeout 20 -L -A 'Mozilla/5.0' 'https://moderngov.lambeth.gov.uk/ieListDocuments.aspx?CId=113&MId=17385' > out/l17385.html || true
      ls -l out
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add out; git commit -m lambout || true; git push origin lambfast
