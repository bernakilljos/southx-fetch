name: fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p out
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124910/Appendix_2_EINA_PMHAP.pdf' > out/eina.pdf
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124926/Recommendation%20Forms.pdf' > out/gforms.pdf
      ls -l out
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add out; git commit -m out || true; git push
