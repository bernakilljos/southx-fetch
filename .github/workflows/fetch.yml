name: fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p wands
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/mgCalendarMonthView.aspx?GL=1&bcr=1&C=-1&DD=2026&M=1&D=1&MR=0&CID=0&OT=' > wands/cal1.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=792&MId=10266' > wands/mid10266.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=305&MId=10010' > wands/mid10010.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=511&MId=10115' > wands/mid10115.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=320&MId=9982' > wands/mid9982.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=763&MId=9927' > wands/mid9927.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/ieListDocuments.aspx?CId=320&MId=10385' > wands/mid10385.html
      mkdir -p wandspdf wantext
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124875/Cabinet%20report%20FHF.pdf' > wandspdf/s124875.pdf
      pdftotext -layout wandspdf/s124875.pdf wantext/s124875.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124876/Fox%20House%20fire%20Independent%20Review.pdf' > wandspdf/s124876.pdf
      pdftotext -layout wandspdf/s124876.pdf wantext/s124876.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124887/26-8%20Cabinet%20cover%20report%20Housing%20TFG.pdf' > wandspdf/s124887.pdf
      pdftotext -layout wandspdf/s124887.pdf wantext/s124887.txt || true
