name: lamb2fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p out
      curl --max-time 480 --connect-timeout 180 -L -A 'Mozilla/5.0' 'https://moderngov.lambeth.gov.uk/documents/s173124/Clapham%20Sauna%202025%20PAC%20final_.pdf' > out/lplan0.pdf &
      curl --max-time 480 --connect-timeout 180 -L -A 'Mozilla/5.0' 'https://moderngov.lambeth.gov.uk/documents/s173129/346%20Clapham%20Road%20ref%2024-01346-FUL%20PAC%20Report.pdf' > out/lplan1.pdf &
      wait
      ls -l out
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add out; git commit -m lambout || true; git push origin lfpdf
