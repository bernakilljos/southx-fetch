      pdftotext -layout wandspdf/s124913.pdf wantext/s124913.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124912/Wandsworth%20-%20Member%20Induction%20and%20Refresher%20Programme.pdf' > wandspdf/s124912.pdf
      pdftotext -layout wandspdf/s124912.pdf wantext/s124912.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124844/CA_Review_final_report_abridged.pdf' > wandspdf/s124844.pdf
      pdftotext -layout wandspdf/s124844.pdf wantext/s124844.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124718/Briefing%20Sheet%20for%20Wandsworth.pdf' > wandspdf/s124718.pdf
      pdftotext -layout wandspdf/s124718.pdf wantext/s124718.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124719/Draft%20G2GV2%20for%20steering%20group%20Dec%202025.pdf' > wandspdf/s124719.pdf
      pdftotext -layout wandspdf/s124719.pdf wantext/s124719.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124944/26-24%20-%20Report.pdf' > wandspdf/s124944.pdf
      pdftotext -layout wandspdf/s124944.pdf wantext/s124944.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124945/26-24%20-%20Redacted%20Bundle.pdf' > wandspdf/s124945.pdf
      pdftotext -layout wandspdf/s124945.pdf wantext/s124945.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124941/26-25%20-%20Report.pdf' > wandspdf/s124941.pdf
      pdftotext -layout wandspdf/s124941.pdf wantext/s124941.txt || true
      ls -l wands wandspdf wantext
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add wands; git commit -m mids || true; git push
