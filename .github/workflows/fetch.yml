      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s124910/Appendix_2_EINA_PMHAP.pdf' > wandspdf/s124910.pdf
      pdftotext -layout wandspdf/s124910.pdf wantext/s124910.txt || true
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://democracy.wandsworth.gov.uk/documents/s125117/Statement%20of%20Decisions.pdf' > wandspdf/s125117.pdf
      pdftotext -layout wandspdf/s125117.pdf wantext/s125117.txt || true
