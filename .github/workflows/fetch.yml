name: fetch
on: [push, workflow_dispatch]
permissions:
 contents: write
jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
   - uses: actions/checkout@v4
   - name: curl
     run: |
      mkdir -p out
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://moderngov.southwark.gov.uk/mgCalendarMonthView.aspx?GL=1&bcr=1' > out/southcal.html
      curl -L --retry 3 -A 'Mozilla/5.0' 'https://www.southwark.gov.uk/about-council/how-council-works/council-and-committee-meetings' > out/southpage.html
      ls -l out
   - name: commit
     run: |
       git config user.email act@example.com; git config user.name act; git add out; git commit -m out || true; git push
